name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck & Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: turbollm/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: turbollm

      - name: Typecheck
        run: npm run typecheck
        working-directory: turbollm

      - name: Unit tests
        run: npm test
        working-directory: turbollm
