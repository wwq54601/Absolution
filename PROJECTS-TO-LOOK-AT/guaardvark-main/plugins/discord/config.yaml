bot:
  token: "${DISCORD_BOT_TOKEN}"
  guild_id: null

api:
  base_url: "http://localhost:${FLASK_PORT:-5002}/api"
  timeout: 120
  health_check_interval: 60

security:
  admin_roles: ["Admin", "Bot Admin"]
  allowed_channels: []
  allow_dms: true
  max_prompt_length: 2000
  max_image_prompt_length: 500

rate_limits:
  ask: 10
  imagine: 3
  generate_csv: 2
  search: 15
  enhance_prompt: 10
  claude: 5
  video: 1

voice:
  enabled: true
  silence_threshold_ms: 1500
  max_listen_duration_s: 30
  tts_voice: "ryan"
  interrupt_on_speech: true

image:
  max_queue_depth: 5
  default_steps: 20
  default_size: 512

conversation:
  max_history: 50

channel_chat:
  channel_ids: []  # Add channel IDs where the bot listens to all messages
  respond_to_mentions: true  # Respond when @mentioned in any channel or when replying to bot messages

vip:
  user_ids: []  # Discord user IDs to receive a one-time welcome DM
  greeting: |
    Welcome to Guaardvark — a self-hosted AI platform you can make your own.

    Try `/ask` to chat, `/claude` to talk to Claude directly, `/imagine` to generate images, or `/status` to see what's running.

outreach:
  enabled: false  # flip to true after seeding channel ids; backend kill switch is the master gate
  channels: []    # Discord channel IDs the bot watches for relevant Ollama / ComfyUI / local-AI threads
  poll_interval_seconds: 600  # how often to scan; 600 = 10 min
  max_replies_per_pass: 1     # never reply to more than one message per channel per pass
