defaults:
  max_concurrent_agents: 5
  worktree_base: ".swarm-worktrees"
  auto_merge: false
  # Autonomous merge-conflict resolution. OFF by default — when on, writes to the
  # Guaardvark repo are routed through guarded_code_service (apply_exact_replacement).
  enable_merger_agent: false
  run_tests_before_merge: true
  test_command: "python3 -m pytest"
  flight_mode: false

backends:
  claude:
    command: "claude"
    # --output-file does not exist in Claude Code 2.x. Claude writes to stdout
    # in --print mode and the backend wrapper script captures that into
    # completion.md. --bare skips hooks, CLAUDE.md auto-discovery, keychain
    # reads, and auto-memory for clean sandboxed worktree execution.
    # --dangerously-skip-permissions bypasses the interactive permission
    # prompts Claude otherwise requires for Bash/Edit/Write tools. Without
    # it, non-interactive agents return a refusal instead of doing the work.
    # The git worktree is the sandbox.
    args: ["--print", "--bare", "--dangerously-skip-permissions"]
    requires_internet: true
    priority: 1
    cost_per_1k_input_tokens: 0.015
    cost_per_1k_output_tokens: 0.075
  cline:
    command: "cline"
    args: []
    model: "ollama/gemma4:e4b"
    requires_internet: false
    priority: 2
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

offline_detection:
  method: "ping"
  target: "api.anthropic.com"
  timeout_seconds: 2
  auto_fallback: true

cost_tracking:
  enabled: true
  currency: "USD"
