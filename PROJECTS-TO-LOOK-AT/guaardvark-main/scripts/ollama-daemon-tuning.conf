# Ollama daemon tuning — recommended server-level env for Guaardvark installs.
# Source: KDnuggets "Tweaking Local LLM Settings with Ollama" + this box's 16GB tier.
#
# These are SERVER-level knobs (the ollama daemon), distinct from per-model
# Modelfile PARAMETERs. They are currently OFF on this machine — turning the two
# cache/attention knobs on is a real 16GB-class win (KV cache ~50% smaller,
# faster prompt pre-fill) with virtually zero quality cost.
#
# APPLY (user-initiated; requires sudo):
#   sudo systemctl edit ollama.service
#   # paste the [Service] block below into the editor, save, then:
#   sudo systemctl daemon-reload
#   sudo systemctl restart ollama
#
# VERIFY after restart:
#   systemctl show ollama.service -p Environment | tr ' ' '\n' | grep OLLAMA

[Service]
Environment="OLLAMA_NUM_PARALLEL=4"
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KEEP_ALIVE=15m"
#
# Notes / distribution caveats:
# - KV_CACHE_TYPE=q8_0  : ~50% KV VRAM saved, negligible quality loss. Safe default
#                         for any modern NVIDIA/Apple GPU. Use q4_0 only for massive
#                         context on small cards (slight perplexity cost).
# - FLASH_ATTENTION=1   : faster pre-fill + lower memory on supported GPUs
#                         (modern NVIDIA/Apple). Harmless to leave on elsewhere.
# - KEEP_ALIVE=15m      : DECIDED 2026-06-01 (was 24h). The 24h pin was the root cause
#                         of image/video CUDA OOM — the 10GB chat model squatted VRAM
#                         on this shared 16GB box. 15m keeps the model warm during an
#                         active chat burst but auto-frees VRAM ~15min after idle, so
#                         image/video gen "just works" with no manual ollama toggling
#                         (the Elon/Dario call: delete the manual process + don't pin
#                         what you don't need; gentler than process-killing). Review
#                         (2026-06-02 10am) may tune 5–30m with measurement.
#                         NOTE: the LIVE 24h pin is NOT coming from systemd (systemctl
#                         show ollama has NUM_PARALLEL but no KEEP_ALIVE) — find the
#                         real source (app preload keep_alive=, or direct `ollama serve`
#                         shell env) and set it to 15m there too.
# - NUM_PARALLEL=4      : already set on this box. Multiplies VRAM per loaded model.
