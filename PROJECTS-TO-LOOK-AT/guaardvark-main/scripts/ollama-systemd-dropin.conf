# Ollama systemd drop-in — Guaardvark daemon tuning (P1-6).
#
# Preferred path (wired in start.sh): start.sh renders this from
# backend.services.hardware_policy.ollama_env (single source of truth, includes
# current NUM_PARALLEL + VULKAN/MAX_LOADED etc. derived from detected VRAM).
# This static file is the safe fallback template used when the policy module
# is not yet importable.
#
# This carries the server-level env so the preferred `sudo systemctl start ollama`
# launch path (which inherits systemd's environment, NOT the shell's) actually
# gets the KV-cache / flash-attention wins.
#
# Companion to scripts/ollama-daemon-tuning.conf (which documents the same knobs
# as a `systemctl edit` snippet for manual application). This file is the version
# start.sh installs automatically as a drop-in, when GPU + non-interactive sudo are
# available. It is installed to (and overrides ollama.service from):
#   /etc/systemd/system/ollama.service.d/guaardvark-tuning.conf
# after which `sudo systemctl daemon-reload` (+ a future restart) applies it.
#
# MANUAL install / verify:
#   sudo install -D -m 0644 scripts/ollama-systemd-dropin.conf \
#       /etc/systemd/system/ollama.service.d/guaardvark-tuning.conf
#   sudo systemctl daemon-reload && sudo systemctl restart ollama
#   systemctl show ollama.service -p Environment | tr ' ' '\n' | grep OLLAMA
#
# Knob notes (see ollama-daemon-tuning.conf for the full rationale):
# - OLLAMA_KV_CACHE_TYPE=q8_0 : ~50% KV VRAM saved, negligible quality loss. A GPU win.
# - OLLAMA_FLASH_ATTENTION=1  : faster prefill + lower memory on supported GPUs.
# - OLLAMA_KEEP_ALIVE=15m     : warm during a chat burst, frees VRAM ~15m after idle
#                               (root-cause fix for image/video CUDA OOM on a shared box).
# - OLLAMA_NUM_PARALLEL=1     : concurrent request slots. Multiplies KV-cache VRAM per
#                               loaded model. Lowered 4 -> 1 (2026-06-14): on the 16 GB
#                               RTX 5060 Ti, 4 slots quadrupled the KV reservation and
#                               can force partial CPU offload of model layers (slow chat,
#                               high CPU, low GPU). Single-slot keeps the model fully on
#                               GPU. Raise to 2 only after confirming model + 2x KV still
#                               fits in 15.5 GiB. NOTE: start.sh shell path defaults to 2
#                               (lines ~1240/1645) — reconcile if you change this.
# - OLLAMA_VULKAN=0           : force CUDA-only. The card runs CUDA fine (sm_120, cuda_v13);
#                               leaving Vulkan enabled only adds a silent fallback path.
[Service]
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KEEP_ALIVE=15m"
Environment="OLLAMA_VULKAN=0"
