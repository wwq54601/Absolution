name: Mythos Verify

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  mythos-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Mythos CI verification
        run: npx -y mythos-router@latest verify --ci
